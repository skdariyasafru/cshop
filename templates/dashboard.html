<!DOCTYPE html>

<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Welcome to Dashboard ✅</h1>

<h2>Items to Buy</h2>

{% for product in products %} <div style="border:1px solid black; padding:10px; margin:10px;"> <h3>{{ product.name }}</h3> <p>Price: ₹{{ product.price }}</p> <a href="/add_to_cart/{{ product.id }}">Add to Cart</a> </div>
{% endfor %}

<br>
<a href="/logout">Logout</a>

</body>
</html>
