{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}

<!-- ===== SEARCH BAR ===== -->
<input type="text" id="indexSearch" placeholder="Search products...">
<input type="text" id="indexSearch" placeholder="Search products...">
<!-- ===== PRODUCT GRID ===== -->
<div class="grid" id="productContainer">

{% if products %}
    {% for product in products %}
    <div class="card">

        {% if product.image %}
            <img src="{{ product.image }}" alt="{{ product.name }}">
        {% else %}
            <div class="image-placeholder"></div>
        {% endif %}

        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>

        <div id="cart-control-{{ product.id }}">
            <button onclick="addToCart({{ product.id }})">
                Add to Cart
            </button>
        </div>

    </div>
    {% endfor %}
{% else %}
<p>No products available</p>
{% endif %}

</div>


<style>

#indexSearch{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:6px;
    border:1px solid #ccc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.image-placeholder{
    width:100%;
    height:180px;
    background:#f2f2f2;
    border-radius:8px;
}

.price{
    font-weight:bold;
    margin:10px 0;
}

</style>

<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

                    
{% endblock %}
